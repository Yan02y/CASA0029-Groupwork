<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Renewable Inequality in New York City</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #fffffe;
      --cyan-light: #e3f6f5;
      --cyan-dark:  #bae8e8;
      --yellow:     #ffd803;
      --orange:     #ff8906;
      --headline:   #2b2c34;
      --sidebar-w:  64px;
      --nav-h:      72px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); -webkit-font-smoothing: antialiased; }

    /* ── TOP NAV ── */
    #topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      z-index: 100;
      border-bottom: 2.5px solid var(--headline);
    }
    .nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--headline);
      letter-spacing: -0.02em;
    }
    .nav-logo strong { color: var(--orange); }
    .nav-links-top {
      display: flex;
      list-style: none;
      gap: 0.4rem;
    }
    .nav-links-top a {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--headline);
      padding: 0.45rem 0.9rem;
      text-decoration: none;
      border-radius: 4px;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .nav-links-top a:hover { background: var(--cyan-light); border-color: var(--headline); }
    .nav-links-top a:focus { outline: none; }
    .nav-links-top a.active {
      background: var(--yellow);
      border-color: var(--headline);
      box-shadow: 2px 2px 0px var(--headline);
    }

    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed;
      left: 0;
      top: var(--nav-h);
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg);
      border-right: var(--border-w) solid var(--headline);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 0;
    }
    .nav-dots::before {
      content: '';
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      border-left: 2px dashed var(--headline);
      opacity: 0.2;
      z-index: -1;
    }
    .nav-dots {
      list-style: none;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1;
      justify-content: center;
    }
    .nav-dots li { position: relative; display: flex; align-items: center; }
    .nav-dots li:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 50%; top: 100%;
      transform: translateX(-50%);
      width: 2px; height: 32px;
      background: var(--headline);
      opacity: 0.15;
    }
    .nav-dot-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: none; border: none; padding: 0; position: relative;
    }
    .nav-dot-btn .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--cyan-dark);
      border: 2px solid var(--headline);
      transition: all 0.3s;
    }
    .nav-dot-btn.active .dot { background: var(--yellow); transform: scale(1.4); }
    .nav-dot-btn:hover .dot { background: var(--orange); transform: scale(1.2); }
    .nav-dot-btn .dot-label {
      position: absolute;
      left: calc(100% + 15px);
      white-space: nowrap;
      background: var(--yellow);
      color: var(--headline);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border: 2px solid var(--headline);
      border-radius: 4px;
      box-shadow: 3px 3px 0px var(--headline);
      pointer-events: none;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.2s ease;
    }
    .nav-dot-btn:hover .dot-label { opacity: 1; transform: translateX(0); }
    .sidebar-label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--headline);
      margin-top: 2rem;
      user-select: none;
    }

    /* ── IFRAME CONTAINER ── */
    #frame-wrap {
      position: fixed;
      left: var(--sidebar-w);
      top: var(--nav-h);
      right: 0;
      bottom: 0;
    }
    /* Stack all iframes, show one at a time */
    .page-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .page-frame.active {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>
<body>

<!-- TOP NAV -->
<header id="topnav">
  <div class="nav-logo"><strong>Solar Energy</strong> Inequality NYC</div>
  <ul class="nav-links-top" id="nav-links-top">
    <li><a href="#" data-idx="0" class="active">Home</a></li>
    <li><a href="#" data-idx="1">Concept</a></li>
    <li><a href="#" data-idx="2">Context</a></li>
    <li><a href="#" data-idx="3">Trends</a></li>
    <li><a href="#" data-idx="4">Solar Map</a></li>
    <li><a href="#" data-idx="5">Urban Morphology</a></li>
    <li><a href="#" data-idx="6">Census Dashboard</a></li>
    <li><a href="#" data-idx="7">Findings & Reflections</a></li>
    <li><a href="#" data-idx="8">About</a></li>
  </ul>
</header>

<!-- SIDEBAR -->
<nav id="sidebar">
  <ul class="nav-dots">
    <li><button class="nav-dot-btn active" data-idx="0"><div class="dot"></div><span class="dot-label">Home</span></button></li>
    <li><button class="nav-dot-btn" data-idx="1"><div class="dot"></div><span class="dot-label">Concept</span></button></li>
    <li><button class="nav-dot-btn" data-idx="2"><div class="dot"></div><span class="dot-label">Context</span></button></li>
    <li><button class="nav-dot-btn" data-idx="3"><div class="dot"></div><span class="dot-label">Trends</span></button></li>
    <li><button class="nav-dot-btn" data-idx="4"><div class="dot"></div><span class="dot-label">Solar Map</span></button></li>
    <li><button class="nav-dot-btn" data-idx="5"><div class="dot"></div><span class="dot-label">Urban Morphology</span></button></li>
    <li><button class="nav-dot-btn" data-idx="6"><div class="dot"></div><span class="dot-label">Census Dashboard</span></button></li>
    <li><button class="nav-dot-btn" data-idx="7"><div class="dot"></div><span class="dot-label">Findings & Reflections</span></button></li>
    <li><button class="nav-dot-btn" data-idx="8"><div class="dot"></div><span class="dot-label">About</span></button></li>
  </ul>
  <div class="sidebar-label" id="sb-label">Home</div>
</nav>

<!-- IFRAME STACK -->
<div id="frame-wrap">
  <iframe class="page-frame active" id="frame-0" src="intro.html" title="Intro"></iframe>
  <iframe class="page-frame" id="frame-1" src="1concept.html" title="Concept"></iframe>
  <iframe class="page-frame" id="frame-2" src="2context.html" title="Context"></iframe>
  <iframe class="page-frame" id="frame-3" src="3trends.html" title="Trends"></iframe>
  <iframe class="page-frame" id="frame-4" src="4solarmap.html" title="Solar Map"></iframe>
  <iframe class="page-frame" id="frame-5" src="5urban.html" title="Urban Morphology"></iframe>
  <iframe class="page-frame" id="frame-6" src="6census.html" title="Census Dashboard"></iframe>
  <iframe class="page-frame" id="frame-7" src="7findings.html" title="Findings & Reflections"></iframe>
  <iframe class="page-frame" id="frame-8" src="8about.html" title="About"></iframe>
</div>

<script>
  const labels   = ['Home','Concept','Context','Trends','Solar Map','Urban Morphology','Census Dashboard','Findings & Reflections','About'];
  const dots     = document.querySelectorAll('.nav-dot-btn');
  const topLinks = document.querySelectorAll('.nav-links-top a');
  const frames   = document.querySelectorAll('.page-frame');
  const sbLabel  = document.getElementById('sb-label');
  let current    = 0;
  let isScrolling = false;

  // Pages with cyan background (indices: 2,4,6,8 = Context, SolarMap, Census, About)
  const cyanPages = new Set([2, 4, 6, 8]);
  const frameWrap = document.getElementById('frame-wrap');

  function goTo(i) {
    if (i === current) return;
    current = i;
    dots.forEach((b, j) => b.classList.toggle('active', j === i));
    topLinks.forEach((a, j) => a.classList.toggle('active', j === i));
    frames.forEach((f, j) => f.classList.toggle('active', j === i));
    sbLabel.textContent = labels[i];
    frameWrap.classList.toggle('cyan-page', cyanPages.has(i));
  }

  dots.forEach(btn => btn.addEventListener('click', () => goTo(+btn.dataset.idx)));
  topLinks.forEach(a => a.addEventListener('click', e => { e.preventDefault(); goTo(+a.dataset.idx); }));

  // Keyboard arrow navigation
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') goTo(Math.min(current + 1, labels.length - 1));
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  goTo(Math.max(current - 1, 0));
  });

  window.addEventListener('wheel', (e) => {
    if (isScrolling) return; 
    isScrolling = true;
    
    setTimeout(() => { isScrolling = false; }, 800);

    if (e.deltaY > 0) {
      goTo(current + 1);
    } else {
      goTo(current - 1);
    }
  }, { passive: true });
</script>
</body>
</html>
