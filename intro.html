<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intro</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    html, body { height: 100%; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      position: relative;
      /* cover image as background */
      background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), url('images/cover.png') center center / cover no-repeat;
    }
    .page-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 6vw;
    }

    /* ── WHITE CARD wrapping all hero text ── */
    .hero-card {
      display: inline-block;
      background: #fffffe;
      border: 2.5px solid var(--headline);
      border-radius: 8px;
      box-shadow: 6px 6px 0px var(--headline);
      padding: 2.5rem 3rem;
      max-width: 740px;
    }

    .hero-eyebrow {
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--headline);
      background: var(--cyan-dark);
      display: inline-block;
      padding: 0.3rem 0.6rem;
      border: 2px solid var(--headline);
      border-radius: 4px;
      margin-bottom: 1.5rem;
    }
    .hero-title {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 700;
      line-height: 1;
      color: var(--headline);
      margin-bottom: 1.5rem;
      letter-spacing: -0.03em;
    }
    .hero-title .acc {
      color: var(--orange);
      position: relative;
      display: inline-block;
      z-index: 1;
    }
    .hero-title .acc::after {
      content: '';
      position: absolute;
      bottom: 4px; left: -4px; right: -4px;
      height: 30%;
      background: var(--yellow);
      z-index: -1;
      border: 2px solid var(--headline);
      opacity: 0.65;
    }
    .hero-sub {
      font-size: clamp(0.95rem, 1.2vw, 1.1rem);
      color: var(--para);
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    .hero-authors {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--headline);
      background: var(--cyan-dark);
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border: 2px solid var(--headline);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="page-inner">
    <div class="hero-card">
      <h1 class="hero-title rv d1">
        Renewable<br>
        <span class="acc">Inequality</span><br>
        in New York City
      </h1>
      <p class="hero-sub rv d2">How building density, heights and household income<br>shape solar adoption across the five boroughs.</p>
      <p class="hero-authors rv d3">Yifei Sun &nbsp;·&nbsp; Yutong Chen &nbsp;·&nbsp; Jie Liu</p>
    </div>
  </div>

  <script>
    // Trigger reveals immediately when iframe becomes active
    function activate() {
      document.querySelectorAll('.rv').forEach(el => el.classList.add('on'));
    }
    // Fire on load + when parent makes this frame visible
    window.addEventListener('load', () => setTimeout(activate, 80));
    window.addEventListener('focus', activate);
  </script>
</body>
</html>
